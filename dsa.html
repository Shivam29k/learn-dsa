<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Lab — Learn Data Structures Interactively</title>
<style>
/* ============================ TOKENS ============================ */
:root{
  --bg:#F6F7FB; --surface:#FFFFFF; --surface2:#EEF1F8; --panel:#F1F3FA;
  --ink:#161C26; --muted:#5A6577; --line:#E2E7F0; --line2:#D5DCEA;
  --primary:#5646D6; --primary-h:#4536C4; --primary-soft:#ECEAFB;
  --ok:#0E9F84; --ok-soft:#E1F5EF; --warn:#D98514; --warn-soft:#FBEEDA;
  --danger:#CE4040; --danger-soft:#FBE7E7;
  --cell:#FFFFFF; --cell-line:#C7CFDF;
  --shadow:0 1px 2px rgba(20,30,50,.04),0 8px 24px rgba(20,30,50,.06);
  --radius:14px; --radius-s:9px;
  --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,"Liberation Mono",monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
html[data-theme="dark"]{
  --bg:#0E131C; --surface:#151C27; --surface2:#1B2431; --panel:#1A222F;
  --ink:#E7ECF4; --muted:#93A0B4; --line:#26303F; --line2:#32405335;
  --primary:#8B7BF0; --primary-h:#9d90f3; --primary-soft:#241f3d;
  --ok:#3FD0AE; --ok-soft:#123028; --warn:#F0B152; --warn-soft:#33280f;
  --danger:#F0736B; --danger-soft:#341c1c;
  --cell:#1E2836; --cell-line:#3A465A;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); background:var(--bg); color:var(--ink);
  line-height:1.6; -webkit-font-smoothing:antialiased; letter-spacing:.005em;
}
a{color:var(--primary)}
::selection{background:var(--primary-soft)}
.mono{font-family:var(--mono)}

/* ============================ LAYOUT ============================ */
.app{display:grid; grid-template-columns:290px 1fr; min-height:100vh}
/* --- sidebar --- */
.side{
  position:sticky; top:0; align-self:start; height:100vh; overflow-y:auto;
  background:var(--surface); border-right:1px solid var(--line);
  padding:22px 16px 40px; z-index:40;
}
.brand{display:flex; align-items:center; gap:11px; padding:6px 8px 16px}
.logo{
  width:34px;height:34px;border-radius:9px;flex:none;
  background:linear-gradient(135deg,var(--primary),#8a7cf0);
  display:grid;place-items:center;color:#fff;font-family:var(--mono);font-weight:700;font-size:15px;
  box-shadow:0 4px 12px rgba(86,70,214,.35);
}
.brand h1{font-size:15.5px;margin:0;letter-spacing:-.01em;line-height:1.15}
.brand p{margin:1px 0 0;font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:.04em}
.sidebar-prog{padding:0 8px 14px}
.sidebar-prog .bar{height:7px;background:var(--surface2);border-radius:99px;overflow:hidden}
.sidebar-prog .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--primary),var(--ok));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.sidebar-prog .lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:7px;letter-spacing:.03em}

.nav{list-style:none;margin:6px 0 0;padding:0}
.nav .grp{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:16px 10px 6px}
.nav li a{
  display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--ink);
  padding:8px 10px;border-radius:9px;font-size:13.5px;position:relative;transition:background .15s;
}
.nav li a:hover{background:var(--surface2)}
.nav li a.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
html[data-theme="dark"] .nav li a.active{color:var(--primary-h)}
.nav .num{
  font-family:var(--mono);font-size:11px;width:24px;height:24px;flex:none;border-radius:7px;
  display:grid;place-items:center;background:var(--surface2);color:var(--muted);border:1px solid var(--line);
}
.nav li a.active .num{background:var(--primary);color:#fff;border-color:transparent}
.nav .num.done{background:var(--ok);color:#fff;border-color:transparent}
.nav .tt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav .chk{opacity:0;color:var(--ok);font-size:14px;transition:opacity .2s}
.nav .chk.show{opacity:1}

/* --- main --- */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:12px 26px;
}
.topbar .hamb{display:none}
.topbar .tprog{flex:1;max-width:340px}
.topbar .tprog .bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden}
.topbar .tprog .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--primary),var(--ok));transition:width .5s}
.topbar .tprog small{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.03em}
.spacer{flex:1}
.iconbtn{
  border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;
  width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:16px;transition:.15s;
}
.iconbtn:hover{border-color:var(--line2);background:var(--surface2)}
.ghost{
  border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;
  height:38px;padding:0 14px;border-radius:10px;font-size:12.5px;font-family:var(--mono);letter-spacing:.03em;transition:.15s;
}
.ghost:hover{border-color:var(--danger);color:var(--danger)}

.wrap{padding:34px 26px 90px;width:100%;display:flex;justify-content:center}
.content{width:100%;max-width:780px}

/* ============================ LESSON HEADER ============================ */
.eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.eyebrow .lz{font-family:var(--mono);font-size:12px;color:var(--primary);letter-spacing:.08em;font-weight:600}
.eyebrow .cat{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);border:1px solid var(--line);padding:3px 8px;border-radius:99px}
h2.title{font-size:30px;line-height:1.12;letter-spacing:-.025em;margin:0 0 10px;font-weight:800}
.lead{font-size:16px;color:var(--muted);margin:0 0 8px}
hr.div{border:0;border-top:1px solid var(--line);margin:26px 0}

/* content typography */
.content h3{font-size:18px;letter-spacing:-.01em;margin:30px 0 10px;font-weight:700}
.content h4{font-size:13px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:22px 0 8px;font-weight:600}
.content p{margin:10px 0}
.pts{list-style:none;margin:10px 0;padding:0}
.pts li{position:relative;padding:4px 0 4px 24px;margin:2px 0}
.pts li::before{content:"";position:absolute;left:4px;top:12px;width:7px;height:7px;border-radius:2px;background:var(--primary);transform:rotate(45deg)}
.pts.sub li::before{background:var(--line2);width:6px;height:6px}
.pts b{font-weight:650}
kbd,code.inl{font-family:var(--mono);font-size:.86em;background:var(--surface2);border:1px solid var(--line);border-radius:5px;padding:1px 5px}

/* callouts */
.callout{border:1px solid var(--line);border-left-width:3px;border-radius:10px;padding:13px 15px;margin:16px 0;font-size:14px;background:var(--surface)}
.callout .ct{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:5px;display:inline-block}
.callout.fix{border-left-color:var(--warn);background:var(--warn-soft)} .callout.fix .ct{color:var(--warn)}
.callout.add{border-left-color:var(--ok);background:var(--ok-soft)} .callout.add .ct{color:var(--ok)}
.callout.tip{border-left-color:var(--primary);background:var(--primary-soft)} .callout.tip .ct{color:var(--primary)}

/* code */
figure.code{margin:16px 0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface)}
figure.code figcaption{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:8px 14px;border-bottom:1px solid var(--line);background:var(--panel);display:flex;align-items:center;gap:8px}
figure.code figcaption::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--primary);box-shadow:14px 0 0 var(--warn),28px 0 0 var(--ok);margin-right:22px}
figure.code pre{margin:0;padding:14px;overflow-x:auto;font-family:var(--mono);font-size:12.5px;line-height:1.65;color:var(--ink)}
.c-com{color:var(--muted);font-style:italic}

/* tables */
.tbl{width:100%;border-collapse:collapse;margin:16px 0;font-size:13.5px;overflow:hidden;border-radius:10px;border:1px solid var(--line)}
.tbl th{background:var(--primary);color:#fff;text-align:left;padding:9px 12px;font-size:12.5px;font-weight:600}
.tbl td{padding:9px 12px;border-top:1px solid var(--line);vertical-align:top}
.tbl tr:nth-child(even) td{background:var(--panel)}

/* ============================ CELL MOTIF ============================ */
.cellrow{display:flex;gap:0;flex-wrap:wrap;align-items:flex-end}
.cell{
  min-width:46px;height:46px;padding:0 6px;background:var(--cell);border:1.5px solid var(--cell-line);
  display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:15px;
  margin-left:-1.5px;position:relative;transition:transform .25s,background .25s,border-color .25s;
}
.cell:first-child{margin-left:0;border-top-left-radius:8px;border-bottom-left-radius:8px}
.cell:last-child{border-top-right-radius:8px;border-bottom-right-radius:8px}
.cellrow.idx .cell{border-radius:0}
.idxlabels{display:flex;margin-top:5px}
.idxlabels span{min-width:46px;margin-left:-1.5px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted)}
.cell.hi{background:var(--primary-soft);border-color:var(--primary);color:var(--primary);transform:translateY(-4px);z-index:2}
.cell.hi2{background:var(--warn-soft);border-color:var(--warn);color:var(--warn)}
.cell.ok{background:var(--ok-soft);border-color:var(--ok);color:var(--ok)}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.cell.enter{animation:pop .28s cubic-bezier(.34,1.56,.64,1)}

/* ============================ WIDGET SHELL ============================ */
.viz{border:1px solid var(--line);border-radius:16px;background:var(--surface);padding:18px;margin:20px 0;box-shadow:var(--shadow)}
.viz .vhead{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.viz .vhead .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 4px var(--ok-soft)}
.viz .vhead h5{margin:0;font-size:12px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.viz .stage{min-height:70px;padding:14px 4px;display:flex;align-items:center;overflow-x:auto}
.viz .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:6px}
.btn{border:1px solid transparent;background:var(--primary);color:#fff;cursor:pointer;height:36px;padding:0 14px;border-radius:9px;font-size:13px;font-weight:600;transition:.15s;font-family:var(--sans)}
.btn:hover{background:var(--primary-h)}
.btn.sec{background:var(--surface2);color:var(--ink);border-color:var(--line)}
.btn.sec:hover{background:var(--panel);border-color:var(--line2)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.field{height:36px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--ink);padding:0 10px;font-family:var(--mono);font-size:13px;width:78px}
.field:focus{outline:2px solid var(--primary-soft);border-color:var(--primary)}
.vmsg{margin-top:12px;font-size:12.5px;color:var(--muted);min-height:18px;font-family:var(--mono)}
.vmsg.err{color:var(--danger)} .vmsg.good{color:var(--ok)}
.stat{display:inline-flex;gap:6px;font-family:var(--mono);font-size:11.5px;color:var(--muted);border:1px solid var(--line);border-radius:7px;padding:3px 8px;margin-right:8px}
.stat b{color:var(--ink)}

/* node (linked list) */
.node{display:flex;align-items:stretch;border:1.5px solid var(--cell-line);border-radius:8px;overflow:hidden;background:var(--cell)}
.node .d{padding:0 14px;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:15px;min-width:40px}
.node .n{padding:0 10px;display:grid;place-items:center;font-family:var(--mono);font-size:11px;color:var(--muted);border-left:1.5px dashed var(--cell-line);background:var(--panel)}
.arrow{align-self:center;color:var(--muted);font-family:var(--mono);padding:0 6px;font-size:15px}
.nullcap{align-self:center;font-family:var(--mono);color:var(--muted);font-size:12px;padding-left:2px}

/* grid (matrix) */
.mgrid{display:inline-grid;gap:4px;border:0}
.mgrid .mc{width:42px;height:38px;display:grid;place-items:center;border:1.5px solid var(--cell-line);border-radius:6px;background:var(--cell);font-family:var(--mono);font-size:14px;transition:.2s}
.mgrid .mc.nz{background:var(--ok-soft);border-color:var(--ok);color:var(--ok);font-weight:700}
.mgrid .mc.cur{background:var(--primary-soft);border-color:var(--primary);color:var(--primary);transform:scale(1.08);z-index:2}
.mgrid .mc.seen{background:var(--warn-soft);border-color:var(--warn)}
.mgrid input.mc{padding:0;text-align:center;color:var(--ink);width:42px}
.mgrid input.mc:focus{outline:2px solid var(--primary-soft);border-color:var(--primary)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--mono);font-size:12px;border:1px solid var(--line);border-radius:7px;padding:4px 9px;background:var(--surface)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.two{grid-template-columns:1fr}}
.subpanel{border:1px solid var(--line);border-radius:11px;padding:12px;background:var(--panel)}
.subpanel h6{margin:0 0 8px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}

/* ============================ QUIZ ============================ */
.quiz{border:1px solid var(--line);border-radius:16px;background:var(--surface);padding:20px;margin:26px 0;box-shadow:var(--shadow)}
.quiz .qh{display:flex;align-items:center;gap:9px;margin-bottom:4px}
.quiz .qh .tg{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--primary);font-weight:700}
.quiz h4.qt{margin:0 0 16px;font-size:12px}
.qitem{margin-bottom:18px}
.qitem .qq{font-weight:600;margin-bottom:9px;font-size:15px}
.qitem .qq .qn{font-family:var(--mono);color:var(--muted);margin-right:6px;font-size:13px}
.opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--surface);color:var(--ink);
  padding:10px 13px;border-radius:9px;margin:6px 0;cursor:pointer;font-size:14px;transition:.14s;font-family:var(--sans)}
.opt:hover:not(:disabled){border-color:var(--primary);background:var(--primary-soft)}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(--ok);background:var(--ok-soft);color:var(--ok);font-weight:600}
.opt.wrong{border-color:var(--danger);background:var(--danger-soft);color:var(--danger)}
.qexp{font-size:13px;color:var(--muted);margin-top:6px;padding-left:2px;display:none}
.qexp.show{display:block}
.qexp b{color:var(--ink)}

/* ============================ FOOTER NAV ============================ */
.lessonfoot{display:flex;align-items:center;gap:12px;margin-top:34px;padding-top:22px;border-top:1px solid var(--line);flex-wrap:wrap}
.complete-btn{border:1.5px solid var(--ok);background:transparent;color:var(--ok);height:44px;padding:0 20px;border-radius:11px;font-weight:700;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:9px;transition:.15s}
.complete-btn:hover{background:var(--ok-soft)}
.complete-btn.done{background:var(--ok);color:#fff}
.navbtns{display:flex;gap:8px;margin-left:auto}
.navbtn{border:1px solid var(--line);background:var(--surface);color:var(--ink);height:44px;padding:0 16px;border-radius:11px;cursor:pointer;font-size:13.5px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.navbtn:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
.navbtn:disabled{opacity:.4;cursor:not-allowed}
.navbtn.pri{background:var(--primary);color:#fff;border-color:transparent}
.navbtn.pri:hover{background:var(--primary-h);color:#fff}

/* toast + confetti */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:11px;font-size:13.5px;font-weight:600;
  box-shadow:var(--shadow);z-index:80;transition:.35s;pointer-events:none;display:flex;gap:9px;align-items:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confetti{position:fixed;top:-12px;width:9px;height:14px;z-index:70;pointer-events:none;border-radius:2px}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.9}}

/* drawer scrim */
.scrim{display:none;position:fixed;inset:0;background:rgba(10,16,26,.45);z-index:35}
.scrim.show{display:block}

/* ============================ RESPONSIVE ============================ */
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;width:284px;transform:translateX(-100%);transition:transform .28s ease;box-shadow:var(--shadow)}
  .side.open{transform:translateX(0)}
  .topbar .hamb{display:grid}
  .wrap{padding:26px 16px 90px}
  h2.title{font-size:25px}
}
@media(max-width:520px){
  .topbar{padding:10px 14px;gap:10px}
  .topbar .tprog{max-width:none}
  .viz{padding:14px}
  .field{width:66px}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<div class="app">
  <!-- ===================== SIDEBAR ===================== -->
  <aside class="side" id="side">
    <div class="brand">
      <div class="logo">DS</div>
      <div><h1>DSA Lab</h1><p>interactive theory</p></div>
    </div>
    <div class="sidebar-prog">
      <div class="bar"><i id="sideBar"></i></div>
      <div class="lbl"><span id="sideCount">0 / 13</span><span id="sidePct">0%</span></div>
    </div>
    <ul class="nav" id="nav"></ul>
  </aside>
  <div class="scrim" id="scrim"></div>

  <!-- ===================== MAIN ===================== -->
  <div class="main">
    <header class="topbar">
      <button class="iconbtn hamb" id="hamb" aria-label="Menu">☰</button>
      <div class="tprog">
        <div class="bar"><i id="topBar"></i></div>
        <small id="topLbl">0% complete</small>
      </div>
      <div class="spacer"></div>
      <button class="iconbtn" id="theme" aria-label="Toggle theme" title="Toggle light / dark">◐</button>
      <button class="ghost" id="reset" title="Clear saved progress">reset</button>
    </header>
    <div class="wrap"><div class="content" id="content"></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ================= STORAGE (safe, degrades gracefully) ================= */
var KEY="dsa_learn_v1", storageOK=true, mem=null;
function loadState(){try{var r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch(e){storageOK=false;return mem;}}
function saveState(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){storageOK=false;mem=JSON.parse(JSON.stringify(state));}}

/* ================= CONTENT HELPERS ================= */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function ul(items,sub){return '<ul class="pts'+(sub?' sub':'')+'">'+items.map(function(i){return "<li>"+i+"</li>";}).join("")+"</ul>";}
function code(src,label){
  var lines=src.replace(/^\n/,"").replace(/\s+$/,"").split("\n");
  var body=lines.map(function(l){var t=l.replace(/^\s+/,"");if(t.indexOf("#")===0)return '<span class="c-com">'+esc(l)+"</span>";
    // dim trailing comments
    var idx=l.indexOf("  #");if(idx>-1){return esc(l.slice(0,idx))+'<span class="c-com">'+esc(l.slice(idx))+"</span>";}
    return esc(l);}).join("\n");
  return '<figure class="code"><figcaption>'+(label||"Python")+"</figcaption><pre>"+body+"</pre></figure>";
}
function callout(kind,title,html){return '<div class="callout '+kind+'"><span class="ct">'+title+"</span><div>"+html+"</div></div>";}
function viz(name,title){return '<div class="viz" data-widget="'+name+'"><div class="vhead"><span class="dot"></span><h5>'+title+"</h5></div></div>";}
/* static cell row */
function cells(vals,idx){
  var r='<div class="cellrow'+(idx?' idx':'')+'">'+vals.map(function(v){return '<div class="cell">'+v+"</div>";}).join("")+"</div>";
  if(idx){r+='<div class="idxlabels">'+vals.map(function(_,i){return "<span>"+i+"</span>";}).join("")+"</div>";}
  return r;
}

/* ================= LESSON DATA ================= */

/* ================= STATE ================= */
var TOTAL=LESSONS.length;
var state=loadState()||{completed:{},current:LESSONS[0].id,theme:null,quiz:{}};
if(!state.completed)state.completed={}; if(!state.quiz)state.quiz={};
if(!LESSONS.some(function(l){return l.id===state.current;}))state.current=LESSONS[0].id;

/* ================= THEME ================= */
function applyTheme(){
  var t=state.theme|| (window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  document.documentElement.setAttribute("data-theme",t);
}
document.getElementById("theme").onclick=function(){
  var cur=document.documentElement.getAttribute("data-theme");
  state.theme=cur==="dark"?"light":"dark";applyTheme();saveState();
};

/* ================= TOAST ================= */
var toastEl=document.getElementById("toast"),toastT;
function toast(msg){toastEl.innerHTML=msg;toastEl.classList.add("show");clearTimeout(toastT);toastT=setTimeout(function(){toastEl.classList.remove("show");},2200);}

/* ================= PROGRESS UI ================= */
function doneCount(){return LESSONS.filter(function(l){return state.completed[l.id];}).length;}
function refreshProgress(){
  var d=doneCount(),pct=Math.round(d/TOTAL*100);
  document.getElementById("sideBar").style.width=pct+"%";
  document.getElementById("topBar").style.width=pct+"%";
  document.getElementById("sideCount").textContent=d+" / "+TOTAL;
  document.getElementById("sidePct").textContent=pct+"%";
  document.getElementById("topLbl").textContent=pct+"% complete";
}

/* ================= SIDEBAR ================= */
function buildNav(){
  var nav=document.getElementById("nav"),html="",lastCat=null;
  LESSONS.forEach(function(l,i){
    if(l.cat!==lastCat){html+='<li class="grp">'+l.cat+"</li>";lastCat=l.cat;}
    var done=!!state.completed[l.id],active=l.id===state.current;
    html+='<li><a href="#'+l.id+'" data-id="'+l.id+'" class="'+(active?"active":"")+'">'+
      '<span class="num'+(done?" done":"")+'">'+(done?"✓":(i+1))+"</span>"+
      '<span class="tt">'+l.title+"</span>"+
      '<span class="chk'+(done?" show":"")+'">●</span></a></li>';
  });
  nav.innerHTML=html;
  Array.prototype.forEach.call(nav.querySelectorAll("a"),function(a){
    a.onclick=function(e){e.preventDefault();go(a.getAttribute("data-id"));closeDrawer();};
  });
}

/* ================= RENDER LESSON ================= */
function go(id){if(!LESSONS.some(function(l){return l.id===id;}))return;state.current=id;saveState();renderLesson();buildNav();window.scrollTo(0,0);
  var c=document.getElementById("content");c.scrollIntoView?window.scrollTo(0,0):0;}
function idx(){return LESSONS.findIndex(function(l){return l.id===state.current;});}

function renderLesson(){
  var i=idx(),l=LESSONS[i],c=document.getElementById("content");
  var head='<div class="eyebrow"><span class="lz">Lesson '+String(i+1).padStart(2,"0")+'</span>'+
    '<span class="cat">'+l.cat+"</span>"+(l.added?'<span class="cat" style="color:var(--ok);border-color:var(--ok)">added</span>':"")+"</div>"+
    '<h2 class="title">'+l.title+"</h2>"+
    '<p class="lead">'+l.lead+"</p><hr class=\"div\">";
  var quizHtml=l.quiz?renderQuiz(l):"";
  c.innerHTML=head+l.body()+quizHtml+renderFoot(i);
  // mount widgets
  Array.prototype.forEach.call(c.querySelectorAll("[data-widget]"),function(el){
    var w=el.getAttribute("data-widget"); if(WIDGETS[w])WIDGETS[w](el);
  });
  wireQuiz(l);
  wireFoot(i);
  refreshProgress();
}

function renderFoot(i){
  var l=LESSONS[i],done=!!state.completed[l.id];
  return '<div class="lessonfoot">'+
    '<button class="complete-btn'+(done?" done":"")+'" id="cbtn">'+(done?"✓ Completed":"Mark complete")+"</button>"+
    '<div class="navbtns">'+
    '<button class="navbtn" id="prev"'+(i===0?" disabled":"")+'>← Prev</button>'+
    '<button class="navbtn pri" id="next"'+(i===TOTAL-1?" disabled":"")+'>Next →</button>'+
    "</div></div>";
}
function wireFoot(i){
  var l=LESSONS[i];
  document.getElementById("cbtn").onclick=function(){toggleComplete(l.id);};
  var p=document.getElementById("prev"),n=document.getElementById("next");
  if(p)p.onclick=function(){if(i>0)go(LESSONS[i-1].id);};
  if(n)n.onclick=function(){if(i<TOTAL-1)go(LESSONS[i+1].id);};
}
function toggleComplete(id,silent){
  var was=!!state.completed[id];
  if(was)delete state.completed[id]; else state.completed[id]=true;
  saveState();buildNav();refreshProgress();
  var b=document.getElementById("cbtn");
  if(b){b.classList.toggle("done",!was);b.innerHTML=was?"Mark complete":"✓ Completed";}
  if(!was&&!silent){
    if(doneCount()===TOTAL){celebrate();toast("🎉 Course complete — every topic done!");}
    else toast("Lesson complete ✓");
  }
}

/* ================= QUIZ ================= */
function renderQuiz(l){
  var items=l.quiz.map(function(q,qi){
    return '<div class="qitem" data-qi="'+qi+'"><div class="qq"><span class="qn">Q'+(qi+1)+'.</span>'+q.q+"</div>"+
      q.o.map(function(op,oi){return '<button class="opt" data-oi="'+oi+'">'+op+"</button>";}).join("")+
      '<div class="qexp"></div></div>';
  }).join("");
  return '<div class="quiz"><div class="qh"><span class="tg">✎ Quick check</span></div>'+
    '<h4 class="qt">answer to test yourself — all correct auto-completes the lesson</h4>'+items+"</div>";
}
function wireQuiz(l){
  if(!l.quiz)return;
  var quizEl=document.querySelector(".quiz");if(!quizEl)return;
  var correct=0,answered=0,total=l.quiz.length;
  Array.prototype.forEach.call(quizEl.querySelectorAll(".qitem"),function(item){
    var qi=+item.getAttribute("data-qi"),q=l.quiz[qi],locked=false;
    var exp=item.querySelector(".qexp");
    Array.prototype.forEach.call(item.querySelectorAll(".opt"),function(btn){
      btn.onclick=function(){
        if(locked)return;locked=true;answered++;
        var oi=+btn.getAttribute("data-oi"),ok=oi===q.a;
        Array.prototype.forEach.call(item.querySelectorAll(".opt"),function(b){
          b.disabled=true;
          if(+b.getAttribute("data-oi")===q.a)b.classList.add("correct");
        });
        if(!ok)btn.classList.add("wrong");
        else correct++;
        exp.innerHTML="<b>"+(ok?"Correct.":"Not quite.")+"</b> "+q.e;
        exp.classList.add("show");
        if(answered===total&&correct===total&&!state.completed[l.id]){
          toggleComplete(l.id);
        }
      };
    });
  });
}

/* ================= CELEBRATION ================= */
function celebrate(){
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  var colors=["#5646D6","#0E9F84","#D98514","#8B7BF0","#CE4040"];
  for(var i=0;i<34;i++){(function(){
    var d=document.createElement("div");d.className="confetti";
    d.style.left=Math.random()*100+"vw";
    d.style.background=colors[i%colors.length];
    d.style.animation="fall "+(1.6+Math.random()*1.4)+"s linear "+(Math.random()*.4)+"s forwards";
    d.style.opacity="0.95";
    document.body.appendChild(d);
    setTimeout(function(){d.remove();},3600);
  })();}
}

/* -- bigo: growth explorer -- */
WIDGETS.bigo=function(el){
  var s=stage(el);s.style.flexDirection="column";s.style.alignItems="stretch";

  var nlab=document.createElement("span");nlab.className="stat";
  wrap.appendChild(nlab);wrap.appendChild(slider);c.appendChild(wrap);
  var fns=[["O(1)",function(n){return 1;}],["O(log n)",function(n){return Math.max(1,Math.round(Math.log2(n)));}],
           ["O(n)",function(n){return n;}],["O(n log n)",function(n){return Math.round(n*Math.max(1,Math.log2(n)));}],
           ["O(n²)",function(n){return n*n;}]];

/* -- stack -- */
WIDGETS.stack=function(el){
  var st=[],CAP=6,counter=1;
  var s=stage(el);s.style.flexDirection="column";s.style.alignItems="center";s.style.minHeight="180px";s.style.justifyContent="flex-start";
  var c=controls(el),m=msg(el);

  [push,pop,peek,clr].forEach(function(x){c.appendChild(x);});
  function stats(){return '<div style="margin-bottom:8px">'+
    '<span class="stat">size <b>'+st.length+"/"+CAP+"</b></span>"+
    '<span class="stat">isEmpty <b>'+(st.length===0)+"</b></span>"+
    '<span class="stat">isFull <b>'+(st.length===CAP)+"</b></span></div>";}
  function draw(hi){
    var col="";
    for(var i=st.length-1;i>=0;i--){var top=i===st.length-1;
      col+='<div class="cell'+(hi&&top?" hi2":"")+'" style="width:130px;height:38px;border-radius:8px;margin:3px 0;position:relative">'+st[i]+
        (top?'<span style="position:absolute;right:-44px;font-size:10px;color:var(--muted)">top</span>':"")+"</div>";}
    s.innerHTML=stats()+(st.length?'<div style="display:flex;flex-direction:column;align-items:center">'+col+"</div>":'<span class="nullcap">empty stack — push to see LIFO</span>');
  }
  push.onclick=function(){if(st.length>=CAP){m.className="vmsg err";m.textContent="Stack Overflow — can't push onto a full stack (checked isFull first).";draw();return;}
    st.push("v"+counter++);draw();m.className="vmsg good";m.textContent="Pushed "+st[st.length-1]+" onto the top.";
    var top=s.querySelector(".cell");if(top)top.classList.add("enter");};
  pop.onclick=function(){if(!st.length){m.className="vmsg err";m.textContent="Stack Underflow — can't pop an empty stack (checked isEmpty first).";return;}
    var v=st.pop();draw();m.className="vmsg";m.textContent="Popped "+v+" (LIFO — the most recently pushed).";};
  peek.onclick=function(){if(!st.length){m.className="vmsg err";m.textContent="Nothing to peek — the stack is empty.";return;}
    draw(true);m.className="vmsg";m.textContent="peek → "+st[st.length-1]+" (top, not removed).";};
  clr.onclick=function(){st=[];counter=1;draw();m.className="vmsg";m.textContent="";};

};

  var s=stage(el);s.style.flexDirection="column";s.style.alignItems="flex-start";s.style.gap="12px";
  var c=controls(el),m=msg(el);
  var conv=mkbtn("Convert"),ex=mkbtn("Load example","sec"),zero=mkbtn("Clear grid","sec");
  [conv,ex,zero].forEach(function(x){c.appendChild(x);});
  var out=document.createElement("div");out.style.width="100%";el.appendChild(out);
  function drawGrid(){
    var g='<div class="mgrid" style="grid-template-columns:repeat('+C+',42px)">';
    for(var i=0;i<R;i++)for(var j=0;j<C;j++){g+='<input class="mc'+(mat[i][j]!==0?" nz":"")+'" data-r="'+i+'" data-c="'+j+'" value="'+mat[i][j]+'">';}
    g+="</div>";
    s.innerHTML='<div class="mono" style="font-size:10px;color:var(--muted)">edit any cell — non-zeros glow</div>'+g;
    Array.prototype.forEach.call(s.querySelectorAll("input.mc"),function(inp){
      inp.oninput=function(){var r=+inp.getAttribute("data-r"),cc=+inp.getAttribute("data-c");var v=parseInt(inp.value,10);mat[r][cc]=isNaN(v)?0:v;inp.classList.toggle("nz",mat[r][cc]!==0);};
    });
  }
  function convert(){
    var trip=[];for(var i=0;i<R;i++)for(var j=0;j<C;j++)if(mat[i][j]!==0)trip.push([i,j,mat[i][j]]);
    if(!trip.length){out.innerHTML="";m.className="vmsg err";m.textContent="All zeros — add a non-zero value to see the representations.";return;}
    m.className="vmsg good";m.textContent=trip.length+" non-zero values → both representations built.";
    var tri='<div class="subpanel"><h6>(1) triplet — row / column / value</h6><table class="tbl" style="margin:0">'+
      '<tr><th>Row</th>'+trip.map(function(t){return "<td>"+t[0]+"</td>";}).join("")+"</tr>"+
      '<tr><th>Column</th>'+trip.map(function(t){return "<td>"+t[1]+"</td>";}).join("")+"</tr>"+
      '<tr><th>Value</th>'+trip.map(function(t){return "<td>"+t[2]+"</td>";}).join("")+"</tr></table></div>";
    var ll='<div class="subpanel" style="margin-top:12px"><h6>(2) linked list — node(row, col, value, next)</h6>'+
      '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px;overflow-x:auto"><span class="mono" style="font-size:11px;color:var(--muted);margin-right:4px">head→</span>'+
      trip.map(function(t){return '<div class="node"><div class="d" style="font-size:12px">'+t[0]+","+t[1]+","+t[2]+'</div><div class="n">next</div></div><span class="arrow">→</span>';}).join("")+
      '<span class="nullcap">NULL</span></div></div>';
    out.innerHTML=tri+ll;
  }
  conv.onclick=convert;
  ex.onclick=function(){mat=[[0,0,3,0,4],[0,0,5,7,0],[0,0,0,0,0],[0,2,6,0,0]];drawGrid();convert();};
  zero.onclick=function(){mat=[];for(var i=0;i<R;i++){mat.push([]);for(var j=0;j<C;j++)mat[i].push(0);}drawGrid();out.innerHTML="";m.className="vmsg";m.textContent="";};
  drawGrid();convert();
};

/* -- spiral -- */
WIDGETS.spiral=function(el){
  var n=4,mat=[],running=false,timer=null;
  function build(){mat=[];var k=1;for(var i=0;i<n;i++){mat.push([]);for(var j=0;j<n;j++)mat[i].push(k++);}}
  build();
  var s=stage(el);s.style.flexDirection="column";s.style.alignItems="flex-start";s.style.gap="12px";
  var c=controls(el),m=msg(el);
  var play=mkbtn("▶ Animate"),reset=mkbtn("Reset","sec"),tog=mkbtn("3×3 / 4×4","sec");
  [play,reset,tog].forEach(function(x){c.appendChild(x);});
  var outWrap=document.createElement("div");outWrap.style.width="100%";el.appendChild(outWrap);
  function order(){var r=[],top=0,bot=n-1,left=0,right=n-1;
    while(top<=bot&&left<=right){
      for(var j=left;j<=right;j++)r.push([top,j]);top++;
      for(var i=top;i<=bot;i++)r.push([i,right]);right--;
      if(top<=bot){for(var j2=right;j2>=left;j2--)r.push([bot,j2]);bot--;}
      if(left<=right){for(var i2=bot;i2>=top;i2--)r.push([i2,left]);left++;}
    }return r;}
  function draw(seen,cur){
    var g='<div class="mgrid" style="grid-template-columns:repeat('+n+',42px)">';
    var seenSet={};(seen||[]).forEach(function(p){seenSet[p[0]+"-"+p[1]]=1;});
    for(var i=0;i<n;i++)for(var j=0;j<n;j++){
      var key=i+"-"+j,cls="mc";if(cur&&cur[0]===i&&cur[1]===j)cls+=" cur";else if(seenSet[key])cls+=" seen";
      g+='<div class="'+cls+'">'+mat[i][j]+"</div>";}
    g+="</div>";s.innerHTML=g;
    outWrap.innerHTML='<div class="subpanel"><h6>output order</h6><div class="mono" style="font-size:13px;word-spacing:2px">'+
      ((seen||[]).map(function(p){return mat[p[0]][p[1]];}).join(", ")||"—")+"</div></div>";
  }
  function stop(){running=false;clearTimeout(timer);play.textContent="▶ Animate";}
  play.onclick=function(){if(running){stop();return;}running=true;play.textContent="⏸ Pause";
    var seq=order(),seen=[],i=0;m.className="vmsg";
    (function step(){if(!running)return;if(i>=seq.length){stop();m.className="vmsg good";m.textContent="Spiral complete — "+seq.length+" cells, O(m×n).";draw(seen);return;}
      var cur=seq[i];draw(seen.slice(),cur);seen.push(cur);m.textContent="Visiting r"+cur[0]+" c"+cur[1]+" = "+mat[cur[0]][cur[1]];i++;timer=setTimeout(step,300);})();};
  reset.onclick=function(){stop();draw();m.className="vmsg";m.textContent="";};
  tog.onclick=function(){stop();n=n===4?3:4;build();draw();m.className="vmsg";m.textContent="Switched to "+n+"×"+n+".";};
  draw();
};

/* ================= DRAWER ================= */
var side=document.getElementById("side"),scrim=document.getElementById("scrim");
function openDrawer(){side.classList.add("open");scrim.classList.add("show");}
function closeDrawer(){side.classList.remove("open");scrim.classList.remove("show");}
document.getElementById("hamb").onclick=openDrawer;
scrim.onclick=closeDrawer;

/* ================= RESET ================= */
document.getElementById("reset").onclick=function(){
  if(!confirm("Clear all saved progress on this device?"))return;
  state={completed:{},current:LESSONS[0].id,theme:state.theme,quiz:{}};
  saveState();buildNav();renderLesson();refreshProgress();toast("Progress cleared");
};

/* ================= KEYBOARD ================= */
document.addEventListener("keydown",function(e){
  if(e.target&&/INPUT|TEXTAREA|SELECT/.test(e.target.tagName))return;
  var i=idx();
  if(e.key==="ArrowRight"&&i<TOTAL-1)go(LESSONS[i+1].id);
  if(e.key==="ArrowLeft"&&i>0)go(LESSONS[i-1].id);
});

/* ================= INIT ================= */
applyTheme();
buildNav();
renderLesson();
refreshProgress();
if(!storageOK)setTimeout(function(){toast("Heads up: this browser is blocking storage, so progress won't be saved between visits.");},600);
</script>
